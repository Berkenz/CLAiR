services:
  db:
    image: postgres:16
    container_name: clair-postgres
    environment:
      POSTGRES_DB: clair_db
      POSTGRES_USER: clair_user
      POSTGRES_PASSWORD: clair_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clair-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clair_user -d clair_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clair-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - clair-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  clair-network:
    driver: bridge
