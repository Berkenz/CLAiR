name: clair
description: CLAiR Mobile Application
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.0
  # Network
  dio: ^5.4.0
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_markdown_plus: ^1.0.7
  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/data/
  
  # Fonts
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf